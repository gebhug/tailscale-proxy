name: Release and Docker Build

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write    # Für das Erstellen des Releases
  packages: write    # Für den Upload zu GHCR
  id-token: write    # Für Cosign Signierung

jobs:
  # JOB 1: Release erstellen und Version berechnen
  create-release:
    runs-on: ubuntu-latest
    outputs:
      # Wir exportieren den neuen Tag, damit der Docker Job ihn nutzen kann
      new_tag: ${{ steps.calculate_version.outputs.tag_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: calculate_version
        run: |
          # Version aus Dockerfile lesen (z.B. v1.90.9)
          TS_VERSION=$(grep 'FROM tailscale/tailscale:' Dockerfile | cut -d':' -f2)
          echo "Detected Tailscale version: $TS_VERSION"

          # Prüfen ob der Basis-Tag existiert
          if ! git tag --list "$TS_VERSION" | grep -q "^$TS_VERSION$"; then
            echo "Basis-Version $TS_VERSION existiert noch nicht. Nutze sie als Tag."
            NEW_TAG="$TS_VERSION"
          else
            echo "Basis-Version $TS_VERSION existiert bereits. Suche nach Fix-Versionen."
            
            # Suche nach existierenden Fix-Tags (z.B. v1.90.9-fix1)
            # Sortierung -v:refname hilft, aber bei Zahlen wie 1 vs 10 müssen wir aufpassen.
            # Wir extrahieren die höchste Nummer.
            
            LAST_FIX_TAG=$(git tag --list "${TS_VERSION}-fix*" --sort=-v:refname | head -n 1)

            if [ -z "$LAST_FIX_TAG" ]; then
              echo "Keine Fix-Tags gefunden. Start mit fix1."
              NEW_TAG="${TS_VERSION}-fix1"
            else
              echo "Letzter Fix-Tag war: $LAST_FIX_TAG"
              # Nummer extrahieren (alles nach -fix)
              LAST_NUM=${LAST_FIX_TAG##*-fix}
              NEXT_NUM=$((LAST_NUM + 1))
              NEW_TAG="${TS_VERSION}-fix${NEXT_NUM}"
            fi
          fi

          echo "Neuer Tag wird sein: $NEW_TAG"
          echo "tag_name=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.calculate_version.outputs.tag_name }}
          name: Release ${{ steps.calculate_version.outputs.tag_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # JOB 2: Docker Image bauen (läuft erst NACH create-release)
  build-docker:
    needs: create-release # Wichtig: Wartet auf den ersten Job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.5.0
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # WICHTIG: Wir nutzen hier explizit den Tag aus dem vorherigen Job
          tags: |
            type=raw,value=${{ needs.create-release.outputs.new_tag }}
            type=raw,value=latest

      - name: Build and push Docker image (x64 & arm64)
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
