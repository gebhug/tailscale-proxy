name: Auto Release v1.0.x

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      # 1. Code auschecken (Wichtig: fetch-depth: 0, um alle Tags zu sehen)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Nächste Version berechnen
      - name: Calculate next version
        id: calculate_version
        run: |
          # Suche nach dem letzten Tag, der mit v1.0. beginnt
          # Sortiere absteigend nach Version, nimm den ersten
          LAST_TAG=$(git tag --list 'v1.0.*' --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            # Wenn kein Tag existiert, starte mit v1.0.0
            echo "Kein vorheriger v1.0.x Tag gefunden. Starte mit v1.0.0"
            NEW_TAG="v1.0.0"
          else
            echo "Letzter Tag war: $LAST_TAG"
            # Extrahiere die letzte Zahl nach dem letzten Punkt
            LAST_VERSION=${LAST_TAG##*.}
            # Addiere 1
            NEXT_VERSION=$((LAST_VERSION + 1))
            NEW_TAG="v1.0.$NEXT_VERSION"
          fi

          echo "Neuer Tag wird sein: $NEW_TAG"
          # Setze die Variable für den nächsten Schritt
          echo "tag_name=$NEW_TAG" >> $GITHUB_OUTPUT

      # 3. Release und Tag erstellen
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.calculate_version.outputs.tag_name }}
          name: Release ${{ steps.calculate_version.outputs.tag_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
